name: Veille Oncologie Quotidienne

on:
  schedule:
    # Tous les matins à 8h00 (heure de Paris = 6h UTC en été, 7h UTC en hiver)
    # On met 6h UTC pour couvrir l'heure d'été
    - cron: '0 7 * * *'
  workflow_dispatch:  # permet aussi de lancer manuellement depuis GitHub

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install requests

      - name: Lancement de la veille
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        run: python veille.py
